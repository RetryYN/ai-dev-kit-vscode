# scrum-backlog.yaml — HELIX Scrum 仮説バックログ
# .helix/scrum/backlog.yaml に配置
#
# status: queued → testing → confirmed / rejected / pivot
# sprint: どのスプリントで検証するか（null = 未割当）

hypotheses:
  H101:
    title: "Forward full flow"
    question: "init to G2 to G4 works"
    acceptance: "G2 G3 pass"
    verify_script: verify/h101-forward-full-flow.sh
    status: confirmed
    sprint: 1
  H102:
    title: "Freeze-break recovery"
    question: "invalidated gates can be re-passed"
    acceptance: "invalidated to passed"
    verify_script: verify/h102-freeze-break-recovery.sh
    status: confirmed
    sprint: 1
  H103:
    title: "Scrum to Forward handoff"
    question: "confirmed hypothesis feeds into size and sprint"
    acceptance: "scrum decide confirmed then helix size and sprint work"
    verify_script: verify/h103-scrum-to-forward-handoff.sh
    status: confirmed
    sprint: 1
  H104:
    title: "Multi-sprint accumulation"
    question: "sprint 2 verify runs sprint 1 scripts too"
    acceptance: "all scripts run on every verify"
    verify_script: verify/h104-multi-sprint-accumulation.sh
    status: confirmed
    sprint: 1
  H105:
    title: "Unified status display"
    question: "helix status shows gates plus scrum in one view"
    acceptance: "gates and sprint and scrum visible"
    verify_script: verify/h105-unified-status-display.sh
    status: confirmed
    sprint: 1
  H201:
    title: "Codex role dispatch"
    question: "helix-codex が全12ロールのスキル注入と dry-run を正しく処理するか"
    acceptance: "12ロール全て dry-run pass、スキルパス・モデル・共通ドキュメントが正しい"
    verify_script: verify/h201-codex-role-dispatch.sh
    status: confirmed
    sprint: 2
  H202:
    title: "PR generation"
    question: "helix-pr がゲート結果とコミットからPRテンプレートを正しく生成するか"
    acceptance: "dry-run でゲートテーブル・サマリ・テストプランが含まれる"
    verify_script: verify/h202-pr-generation.sh
    status: confirmed
    sprint: 2
  H203:
    title: "CLAUDE.md enforcement"
    question: "helix-check-claudemd がテンプレートなしの CLAUDE.md 作成をブロックするか"
    acceptance: "必須セクション欠落で deny、準拠で pass、既存ファイル更新はスルー"
    verify_script: verify/h203-claudemd-enforcement.sh
    status: confirmed
    sprint: 2
  H204:
    title: "Session context injection"
    question: "helix-session-start が有効な JSON でコンテキストを出力するか"
    acceptance: "JSON valid、全ツール名を含む、Scrum 情報を含む"
    verify_script: verify/h204-session-context-injection.sh
    status: confirmed
    sprint: 2
  H205:
    title: "Gate cascade integrity"
    question: "G2→G7 の全ゲート前提条件チェーンが正しく機能するか"
    acceptance: G3はG2必須、G4はG3必須...G7はG6必須。未通過で全てブロック
    verify_script: verify/h205-gate-cascade-integrity.sh
    status: confirmed
    sprint: 2
  H206:
    title: "Concurrent mode safety"
    question: "Forward と Scrum を同一プロジェクトで並行運用してphase.yamlが壊れないか"
    acceptance: gate操作とsprint操作とscrum操作が互いに干渉しない
    verify_script: verify/h206-concurrent-mode-safety.sh
    status: confirmed
    sprint: 2
