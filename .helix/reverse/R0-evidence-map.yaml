# =============================================================================
# 4. external_apis — 外部依存
# =============================================================================
external_apis:
  runtime_required:
    - name: python3
      usage: lib モジュール全般・yaml_parser・helix_db・matrix_compiler 等
      version_constraint: ">=3.10（match/case, pathlib, typing）"
      note: 標準ライブラリのみ使用（PyYAML, requests 等のサードパーティ不要）

    - name: bash
      usage: CLI コマンド本体（32本中28本が bash）
      version_constraint: ">=4.0（連想配列・mapfile 使用）"

    - name: git
      usage: PROJECT_ROOT 検出（git rev-parse）、helix-test 内の git init
      note: helix-common.sh で git rev-parse --show-toplevel を使用

    - name: sqlite3
      usage: python3 sqlite3 モジュール経由。外部バイナリ直接呼び出しなし
      note: WAL ジャーナルモード使用

  external_tools:
    - name: codex
      usage: helix-codex から codex exec で Codex CLI を呼び出し
      invocation: "codex exec <prompt> -m <model> -s <sandbox>"
      fallback: "$HOME/.npm-global/bin/codex"
      required: true
      note: 全12ロールの委譲先。リトライ2回・タイムアウト300秒

    - name: gh
      usage: helix-pr で gh pr create
      required: false
      note: PR 作成時のみ必要

    - name: rg (ripgrep)
      usage: gate-checks.yaml の static チェック内で使用
      required: false
      note: ゲートチェック時のみ。なければチェックスキップ

  optional_tools:
    - name: d2
      usage: ダイアグラム生成（skills/design-tools/diagram）
      setup: cli/scripts/setup-d2.sh

    - name: marp
      usage: プレゼンテーション生成（skills/design-tools/pptx）
      setup: cli/scripts/setup-marp.sh

    - name: playwright
      usage: E2E テスト・ブラウザスクリプト
      setup: cli/scripts/setup-playwright.sh

    - name: textlint
      usage: 日本語テキスト校正（skills/writing/japanese）
      setup: cli/scripts/setup-textlint.sh

    - name: axe-core
      usage: アクセシビリティ自動検証（skills/common/testing）
      setup: cli/scripts/setup-axe.sh

    - name: crawl4ai
      usage: サイト構造抽出（skills/automation/site-mapping）
      setup: cli/scripts/setup-crawl4ai.sh

# =============================================================================
# 5. unknowns — 設計文書なし / テストなし / 仕様不明
# =============================================================================
unknowns:
  # --- 設計文書なし ---
  no_design_doc:
    - item: CLI 全体のアーキテクチャ設計書
      note: SKILL_MAP.md + HELIX_CORE.md にフロー定義あるが、CLI 内部アーキテクチャの設計文書は未作成

    - item: Builder System の設計仕様書
      note: builders/ は12モジュール・2655行あるが独立した設計文書なし。base.py の docstring のみ

    - item: Learning Engine の設計仕様書
      note: 2000行の最大モジュール。recipe 生成ロジックの設計文書なし

    - item: DB マイグレーション戦略の文書化
      note: schema_version 4 まで進行。マイグレーションロジックは helix_db.py 内にあるが方針文書なし

    - item: 状態機械の遷移仕様書
      note: state-machine.yaml テンプレートはあるが、実際の遷移制約が phase_guard.py 内にハードコードされている

  # --- ユニットテストなし（helix-test の統合テストのみ） ---
  no_unit_test:
    - module: cli/lib/deliverable_gate.py
      lines: 522
      severity: medium

    - module: cli/lib/doc_map_matcher.py
      lines: 111
      severity: low

    - module: cli/lib/freeze_checker.py
      lines: 351
      severity: medium

    - module: cli/lib/gate_check_generator.py
      lines: 609
      severity: medium

    - module: cli/lib/global_store.py
      lines: 611
      severity: high
      note: 複数プロジェクト横断のデータ管理。統合テストの一部としてのみカバー

    - module: cli/lib/matrix_compiler.py
      lines: 1435
      severity: high
      note: 最重要コンパイラ。統合テストはあるがユニットテストなし

    - module: cli/lib/matrix_advisor.py
      lines: 453
      severity: medium

    - module: cli/lib/merge_settings.py
      lines: 146
      severity: low

    - module: cli/lib/phase_guard.py
      lines: 366
      severity: medium

    - module: cli/lib/recipe_store.py
      lines: 245
      severity: medium

    - module: cli/lib/team_runner.py
      lines: 248
      severity: medium

    - module: cli/lib/builders/
      lines: 2655
      severity: medium
      note: 14モジュール全体にユニットテストなし。helix-test 統合テストで一部カバー

  # --- helix-test 内テストが --help のみ / 極小 ---
  minimal_test_coverage:
    - command: helix-debug
      note: helix-test 内でテストなし。helix help に表示確認のみ

    - command: helix-verify-all
      note: --help テストのみ。verify/h401 で部分カバー

  # --- 仕様不明点 ---
  spec_unclear:
    - item: helix-interrupt の IIP/CC 分類ロジック
      note: 890行と大規模だが分類アルゴリズムの仕様文書なし

    - item: helix-hook の doc-map トリガー優先度
      note: 複数トリガーが一致した場合の優先度制御が不明

    - item: Builder quality_score の算出基準
      note: validate_output で返す validation dict の quality_score 算出方法がビルダーごとに異なるが統一基準なし

    - item: recipe の昇格条件
      note: helix-promote が recipe → Builder 生成物に昇格するが、自動昇格の閾値が文書化されていない

    - item: gate_runs.task_run_id FK の実 DB 不整合
      note: |
        helix_db.py の CREATE TABLE 定義では gate_runs.task_run_id に REFERENCES task_runs(id) があるが、
        実際の DB スキーマでは FK なしで作成されている（SQLite の FK 制約はデフォルト無効）

    - item: helix-test と helix-test-debug の重複
      note: ほぼ同一内容（1540行 vs 1533行）。差分管理の方針が不明

    - item: fullstack 駆動タイプの L4.5 結合フェーズ
      note: SKILL_MAP.md で定義されているが CLI 側での実装状況が不明

    - item: RGC（Reverse Gap Closure）
      note: MEMORY.md に「CLI 未実装」と明記。Forward L6/L8 pass 後の手動実施とされている

  # --- 潜在リスク ---
  potential_risks:
    - item: SQLite FK 制約が未 enforce
      note: PRAGMA foreign_keys = ON が未設定。整合性は application レイヤーで保証
      severity: medium

    - item: yaml_parser.py は限定的 YAML パーサー
      note: 複雑な YAML（アンカー・マージキー・フロー等）は非対応。用途限定で問題ないが制約が明文化されていない
      severity: low

    - item: learning_engine.py の 2000行
      note: 単一ファイルで最大。責務が recipe 生成 + 分析 + スコアリングに跨り分割候補
      severity: low

    - item: Codex 依存のレジリエンス
      note: codex exec が失敗した場合のフォールバックはリトライ2回のみ。代替モデルへの切り替えなし
      severity: medium
