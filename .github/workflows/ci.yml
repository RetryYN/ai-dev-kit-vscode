name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  HELIX_HOME: ${{ github.workspace }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure Git for tests
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "GitHub Actions CI"

      - name: Run helix-test
        run: bash cli/helix-test

      - name: Run helix-verify-all
        run: bash cli/helix-verify-all

      - name: Run pytest (if tests exist)
        if: ${{ hashFiles('cli/lib/tests/**') != '' }}
        run: python3 -m pytest cli/lib/tests/ -v || true
